<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arG2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="1000" height="660" fill="#0a0e14"/>

  <!-- TITLE BLOCK -->
  <rect x="20" y="20" width="960" height="44" fill="none" stroke="#2a3550" stroke-width="1"/>
  <text x="34" y="40" fill="#e6edf3" font-size="14" font-weight="bold" letter-spacing="1.5">POWER DISTRIBUTION — CONFIG B: 5 NODES, SWITCH ON SEPARATE 25.2V FEED</text>
  <text x="34" y="56" fill="#556070" font-size="10">12V system · switch relocated to raw PSU rail · converter feeds nodes only</text>
  <text x="966" y="40" text-anchor="end" fill="#f59e0b" font-size="11" font-weight="bold">DWG B</text>
  <text x="966" y="56" text-anchor="end" fill="#556070" font-size="9">expansion plan</text>

  <!-- 230V AC -->
  <rect x="40" y="100" width="105" height="60" rx="3" fill="#141a24" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="92" y="123" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="bold">MAINS</text>
  <text x="92" y="139" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="bold">230V AC</text>
  <text x="92" y="153" text-anchor="middle" fill="#556070" font-size="8">50Hz</text>

  <line x1="145" y1="130" x2="185" y2="130" stroke="#f59e0b" stroke-width="2"/>

